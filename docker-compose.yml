x-app: &app
  build:
    context: .
  image: deadabase:local
  environment:
    DB_URL: postgres://postgres:postgres@db:5432/deadabase?sslmode=disable

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: deadabase
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d deadabase"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    image: ghcr.io/pressly/goose:latest
    depends_on:
      db:
        condition: service_healthy
    environment:
      GOOSE_DRIVER: postgres
      GOOSE_DBSTRING: postgres://postgres:postgres@db:5432/deadabase?sslmode=disable
      GOOSE_MIGRATION_DIR: /migrations
    volumes:
      - ./sql/schema:/migrations
    command: ["up"]

  import:
    <<: *app
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: ["./importer"]

  api:
    <<: *app
    depends_on:
      import:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  db_data:
